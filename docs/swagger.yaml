    required:
    - email
    - password
    type: object
  users.UpdateUserInput:
    properties:
      first_name:
        type: string
      last_name:
        type: string
      phone:
        type: string
      profile_picture_url:
        type: string
    required:
    - first_name
    - last_name
    type: object
  users.VerifyUserInput:
    properties:
      email:
        type: string
      token:
        type: string
    required:
    - email
    - token
    type: object
  visits.CreateVisitRequest:
    properties:
      property_id:
        type: integer
      visit_date:
        type: string
    required:
    - property_id
    - visit_date
    type: object
  visits.TimeSlot:
    properties:
      available:
        type: boolean
      end_time:
        type: string
      start_time:
        type: string
    type: object
  visits.VisitResponse:
    properties:
      address:
        type: string
      agent_id:
        type: integer
      agent_name:
        type: string
      agent_phone:
        type: string
      city_name:
        type: string
      client_name:
        type: string
      client_phone:
        type: string
      created_at:
        type: string
      property_id:
        type: integer
      property_title:
        type: string
      status:
        type: string
      visit_date:
        type: string
      visit_uuid:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API de Spazio Backend
  title: Spazio API
  version: "1.0"
paths:
  /api/v1/catalogs/modalities:
    get:
      description: Returns all modalities ordered by modality_id ascending.
      produces:
      - application/json
      responses:
        "200":
          description: List of modalities
          schema:
            $ref: '#/definitions/catalogs.ListModalitiesResult'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List modalities
      tags:
      - Catalogs
  /api/v1/catalogs/orientations:
    get:
      description: Returns all orientations ordered by name ascending.
      produces:
      - application/json
      responses:
        "200":
          description: List of orientations
          schema:
            $ref: '#/definitions/catalogs.ListOrientationsResult'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List orientations
      tags:
      - Catalogs
  /api/v1/catalogs/property-types:
    get:
      description: Returns all non-deprecated property types ordered by property_type_id
        ascending.
      produces:
      - application/json
      responses:
        "200":
          description: List of property types
          schema:
            $ref: '#/definitions/catalogs.ListPropertyTypesResult'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List property types
      tags:
      - Catalogs
  /api/v1/catalogs/rent-periods:
    get:
      description: Returns rent periods enabled for the provided property type, ordered
        by period_id ascending.
      parameters:
      - description: Property type ID
        in: query
        name: property_type_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of rent periods
          schema:
            $ref: '#/definitions/catalogs.ListRentPeriodsResult'
        "400":
          description: Invalid query params
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List rent periods
      tags:
      - Catalogs
  /api/v1/clauses:
    get:
      description: Returns clauses available for the provided modality. When q is
        present, the endpoint performs a filtered search. Results are paginated.
      parameters:
      - description: Modality ID
        in: query
        name: modality_id
        required: true
        type: integer
      - description: Search term
        in: query
        name: q
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Results per page
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of clauses
          schema:
            $ref: '#/definitions/clauses.ListClausesResult'
        "400":
          description: Invalid query params
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List clauses
      tags:
      - Clauses
  /api/v1/contracts:
    get:
      description: Returns a paginated list of contracts. Admins and Agents see all,
        Owners see only their own. The authenticated user is resolved from the bearer
        token.
      parameters:
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 10)
        in: query
        name: limit
        type: integer
      - description: Filter by type (sale/rent)
        in: query
        name: transaction_type
        type: string
      - description: Filter by status ID
        in: query
        name: status_id
        type: integer
      - description: Filter by owner ID (Admin/Agent only)
        in: query
        name: owner_id
        type: integer
      - description: Filter by start date (RFC3339)
        in: query
        name: start_date
        type: string
      - description: Filter by end date (RFC3339)
        in: query
        name: end_date
        type: string
      - description: Search by property title or client name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/contracts.ContractListItem'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List contracts
      tags:
      - Contracts
    post:
      consumes:
      - application/json
      description: Generates a legal contract in PDF format based on real estate transaction
        data and stores it in R2. Only the property owner can invoke this endpoint.
      parameters:
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Contract generation data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/contracts.CreateContractInput'
      produces:
      - application/json
      responses:
        "201":
          description: Contract generated and stored successfully
          schema:
            $ref: '#/definitions/contracts.CreateContractResult'
        "400":
          description: Invalid input or logical date error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "403":
          description: Unauthorized user (not the owner)
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error in PDF generation or storage
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Generate digital contract
      tags:
      - Contracts
  /api/v1/contracts/{uuid}:
    get:
      description: Returns the full details of a contract, including the PDF URL,
        using the authenticated session.
      parameters:
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Contract UUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/contracts.ContractDetail'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Get contract detail
      tags:
      - Contracts
  /api/v1/locations/cities:
    get:
      description: Returns cities for the selected state. Results are paginated.
      parameters:
      - description: State ID
        in: query
        name: state_id
        required: true
        type: integer
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 50
        description: Results per page
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of cities
          schema:
            $ref: '#/definitions/locations.ListCitiesResult'
        "400":
          description: Invalid query params
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List cities
      tags:
      - Locations
  /api/v1/locations/countries:
    get:
      description: Returns all available countries ordered by name.
      produces:
      - application/json
      responses:
        "200":
          description: List of countries
          schema:
            $ref: '#/definitions/locations.ListCountriesResult'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List countries
      tags:
      - Locations
  /api/v1/locations/states:
    get:
      description: Returns all states for the selected country ordered by name.
      parameters:
      - description: Country ID
        in: query
        name: country_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of states
          schema:
            $ref: '#/definitions/locations.ListStatesResult'
        "400":
          description: Invalid query params
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List states
      tags:
      - Locations
  /api/v1/payments:
    get:
      description: Returns payments visible to the authenticated user resolved from
        the bearer token.
      parameters:
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Filter by property ID
        in: query
        name: property_id
        type: integer
      - description: Filter by payment status ID
        in: query
        name: status_id
        type: integer
      - description: Minimum due date in YYYY-MM-DD format
        in: query
        name: date_from
        type: string
      - description: Maximum due date in YYYY-MM-DD format
        in: query
        name: date_to
        type: string
      - description: Maximum number of results to return
        in: query
        name: limit
        type: integer
      - description: Pagination offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/payments.ListPaymentsResult'
      summary: List payments
      tags:
      - Payments
    post:
      consumes:
      - application/json
      description: Register a payment for a contract with simulation logic (terminates
        in 0000 for failure).
      parameters:
      - description: Payment Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/payments.RegisterPaymentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/payments.PaymentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Process a payment (Simulated)
      tags:
      - Payments
  /api/v1/payments/{payment_id}:
    get:
      description: Returns one payment detail visible to the authenticated user resolved
        from the bearer token.
      parameters:
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Payment ID
        in: path
        name: payment_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/payments.PaymentDetail'
      summary: Get payment detail
      tags:
      - Payments
  /api/v1/payments/{uuid}/confirm:
    patch:
      consumes:
      - application/json
      description: Manually transition a 'Pending' payment (like OXXO) to 'Completed'.
      parameters:
      - description: Payment UUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Confirm a pending payment
      tags:
      - Payments
  /api/v1/payments/webhook:
    post:
      consumes:
      - application/json
      description: Webhook receiver for asynchronous payment updates.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Handle MercadoPago Webhooks
      tags:
      - Payments
  /api/v1/properties:
    get:
      description: Returns a paginated list of property cards. Administrators can
        view non-deleted properties, while agents can only view properties assigned
        in property_agents. Supports filtering by search query, status, property type,
        modality, location (country, state, city), price range, and minimum bedrooms.
        Price selection logic prioritizes sale price, then the best current rent price
        (Monthly > Annual > Weekly > Daily).
      parameters:
      - default: 1
        description: Page number (starts at 1)
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page (max 100)
        in: query
        name: page_size
        type: integer
      - description: Search term (matches title, address, city, state, country)
        in: query
        name: q
        type: string
      - collectionFormat: csv
        description: Filter by status IDs (defaults to Available=2 when omitted)
        in: query
        items:
          type: integer
        name: status_id
        type: array
      - description: Filter by property type ID
        in: query
        name: property_type_id
        type: integer
      - description: Filter by modality ID
        in: query
        name: modality_id
        type: integer
      - description: Filter by country ID
        in: query
        name: country_id
        type: integer
      - description: Filter by state ID
        in: query
        name: state_id
        type: integer
      - description: Filter by city ID
        in: query
        name: city_id
        type: integer
      - description: Minimum price filter
        in: query
        name: min_price
        type: number
      - description: Maximum price filter
        in: query
        name: max_price
        type: number
      - description: Minimum bedrooms filter (Residential only)
        in: query
        name: min_bedrooms
        type: integer
      - description: 'Sort by: created_at, title, price'
        in: query
        name: sort
        type: string
      - description: 'Sort order: asc, desc'
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Paginated list of property cards
          schema:
            $ref: '#/definitions/properties.ListPropertiesResult'
        "400":
          description: Invalid input parameters
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "401":
          description: Missing or invalid authenticated session
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List properties with advanced filters
      tags:
      - Properties
    post:
      consumes:
      - application/json
      description: Registers a property and all related records in a single database
        transaction. The backend generates the property UUID and stores subtype, location,
        pricing, services, and clauses atomically. The authenticated user is set as
        the owner.
      parameters:
      - description: Property payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/properties.CreatePropertyInput'
      produces:
      - application/json
      responses:
        "201":
          description: Property created
          schema:
            $ref: '#/definitions/properties.CreatePropertyResult'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Register a new property
      tags:
      - Properties
  /api/v1/properties/{uuid}:
    delete:
      consumes:
      - application/json
      description: Soft deletes a property by UUID. Requires confirm=true. The authenticated
        admin is recorded as the author of the status change. The operation deletes
        linked photo objects from storage before applying database updates. Only properties
        with available status can be deleted.
      parameters:
      - description: Property UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: Delete payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/properties.DeletePropertyInput'
      produces:
      - application/json
      responses:
        "200":
          description: Property deleted
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Property not found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete property
      tags:
      - Properties
    get:
      description: Returns property base data, subtype, and location for the given
        UUID. Administrators can view all fields including registered_by. Agents can
        only access assigned properties and do not receive registered_by.
      parameters:
      - description: Property UUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Property data
          schema:
            $ref: '#/definitions/properties.GetPropertyResult'
        "400":
          description: Invalid path parameter
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "401":
          description: Missing or invalid authenticated session
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Property not found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get property by UUID
      tags:
      - Properties
    patch:
      consumes:
      - application/json
      description: |-
        Updates property base data, subtype and location.
        Requires an authenticated admin session.
      parameters:
      - description: Property UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: Update payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/properties.UpdatePropertyInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/properties.UpdatePropertyResult'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Property not found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update property
      tags:
      - Properties
  /api/v1/properties/{uuid}/availability:
    get:
      consumes:
      - application/json
      description: Get available 1-hour slots for a property on a specific date
      parameters:
      - description: Property ID
        in: path
        name: uuid
        required: true
        type: integer
      - description: Date (YYYY-MM-DD). Defaults to today.
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/visits.TimeSlot'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Get property availability
      tags:
      - visits
  /api/v1/properties/{uuid}/clauses:
    get:
      description: Returns the clauses linked to a property by UUID. When the property
        has no clauses, the response contains an empty data array.
      parameters:
      - description: Property UUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Property clauses
          schema:
            $ref: '#/definitions/properties.GetPropertyClausesResult'
        "400":
          description: Invalid path parameter
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Property not found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List property clauses
      tags:
      - Properties
    put:
      consumes:
      - application/json
      description: Replaces all clauses linked to a property by UUID. When the payload
        omits clauses or sends an empty array, all linked clauses are removed.
      parameters:
      - description: Property UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: Property clauses payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/properties.UpdatePropertyClausesInput'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Property not found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Replace property clauses
      tags:
      - Properties
  /api/v1/properties/{uuid}/history:
    get:
      description: Returns the chronological history of status changes for a specific
        property. Requires an authenticated admin session.
      parameters:
      - description: Property UUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Chronological status history retrieved successfully
          schema:
            $ref: '#/definitions/properties.GetPropertyHistoryResult'
        "400":
          description: Invalid UUID
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "401":
          description: Missing or invalid authenticated session
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Property not found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get property status history
      tags:
      - Properties
  /api/v1/properties/{uuid}/photos:
    get:
      description: Returns the photo metadata linked to a property by UUID ordered
        by sort_order ascending. When the property has no photos, the response contains
        an empty data array.
      parameters:
      - description: Property UUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Property photos
          schema:
            $ref: '#/definitions/properties.GetPropertyPhotosResult'
        "400":
          description: Invalid path parameter
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Property not found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List property photos
      tags:
      - Properties
    put:
      consumes:
      - application/json
      description: Replaces the stored metadata of the photos linked to a property
        by UUID. Exactly one photo must be marked as cover when the payload contains
        photos. When the payload omits photos or sends an empty array, all linked
        photos are removed.
      parameters:
      - description: Property UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: Property photos payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/properties.UpdatePropertyPhotosInput'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Property not found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Replace property photos
      tags:
      - Properties
  /api/v1/properties/{uuid}/prices:
    get:
      description: Returns the active prices of a property by UUID. Sale price and
        rent prices include only currently active records (is_current=true). If no
        active sale price exists, sale_price is null. If no active rent prices exist,
        rent_prices is an empty array.
      parameters:
      - description: Property UUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Property prices
          schema:
            $ref: '#/definitions/properties.GetPropertyPricesResult'
        "400":
          description: Invalid path parameter
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Property not found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Get property prices
      tags:
      - Properties
    put:
      consumes:
      - application/json
      description: Updates property prices by UUID. Only processes prices in the payload;
        unmodified prices remain unchanged. When the amount of a price changes, a
        new price record is created and the old one is marked as inactive. Amounts
        must be greater than 0. Currency is not editable.
      parameters:
      - description: Property UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: Property prices payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/properties.UpdatePropertyPricesInput'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Property not found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Update property prices
      tags:
      - Properties
  /api/v1/properties/{uuid}/prices/history:
    get:
      description: Returns the complete price history for a property. Requires admin
        role.
      parameters:
      - description: Property UUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Property prices history
          schema:
            $ref: '#/definitions/properties.GetPropertyPricesHistoryResult'
        "400":
          description: Invalid path parameter
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "401":
          description: Missing or invalid authenticated session
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Property not found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get property prices history
      tags:
      - Properties
  /api/v1/properties/{uuid}/services:
    get:
      description: Returns the service IDs linked to a property by UUID. When the
        property has no services, the response contains an empty service_ids array.
      parameters:
      - description: Property UUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Property services
          schema:
            $ref: '#/definitions/properties.GetPropertyServicesResult'
        "400":
          description: Invalid path parameter
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Property not found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List property services
      tags:
      - Properties
    put:
      consumes:
      - application/json
      description: Replaces all services linked to a property by UUID. When the payload
        omits service_ids or sends an empty array, all linked services are removed.
      parameters:
      - description: Property UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: Property services payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/properties.UpdatePropertyServicesInput'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Property not found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Replace property services
      tags:
      - Properties
  /api/v1/services:
    get:
      description: Returns popular active services when q is empty, or matching active
        services when q is provided. Results include metadata and honor the optional
        limit parameter.
      parameters:
      - description: Search term
        in: query
        name: q
        type: string
      - description: Results limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of services
          schema:
            $ref: '#/definitions/services.ListServicesResult'
        "400":
          description: Invalid query params
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List services
      tags:
      - Services
  /api/v1/uploads/properties/{property_uuid}/photos:
    post:
      consumes:
      - multipart/form-data
      description: Uploads a property photo to object storage and registers metadata.
        Max size is 5MB and allowed types are image/jpeg, image/png, and image/webp.
      parameters:
      - description: Property UUID
        in: path
        name: property_uuid
        required: true
        type: string
      - description: Image file
        in: formData
        name: file
        required: true
        type: file
      - description: Optional label
        in: formData
        name: label
        type: string
      - description: Optional alt text
        in: formData
        name: alt_text
        type: string
      - default: 0
        description: Sort order
        in: formData
        name: sort_order
        type: integer
      - default: false
        description: Mark as cover
        in: formData
        name: is_cover
        type: boolean
      produces:
      - application/json
      responses:
        "201":
          description: Photo uploaded
          schema:
            $ref: '#/definitions/uploads.UploadPhotoResult'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Property not found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Upload property photo
      tags:
      - Uploads
  /api/v1/visits:
    get:
      description: List visits according to the authenticated user role (Admin, Agent,
        Client). Supports filtering by status, property and date.
      parameters:
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Status ID
        in: query
        name: status_id
        type: integer
      - description: Property ID
        in: query
        name: property_id
        type: integer
      - description: Date (YYYY-MM-DD)
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/visits.VisitResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List user visits
      tags:
      - visits
    post:
      consumes:
      - application/json
      description: Create a new visit request in 'Pending' status for the authenticated
        user.
      parameters:
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Visit Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/visits.CreateVisitRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/visits.VisitResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Schedule a visit
      tags:
      - visits
  /api/v1/visits/{uuid}/complete:
    patch:
      consumes:
      - application/json
      description: Mark a confirmed visit as completed. Only for Agents or Admin from
        the authenticated session.
      parameters:
      - description: Visit UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Complete a visit
      tags:
      - visits
  /api/v1/visits/{uuid}/confirm:
    patch:
      consumes:
      - application/json
      description: Transition a visit status towards 'Confirmed' by Client or Agent
        using the authenticated session.
      parameters:
      - description: Visit UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Confirm a visit
      tags:
      - visits
  /api/v1/visits/{uuid}/reschedule:
    patch:
      consumes:
      - application/json
      description: Cancels the old visit and creates a new one with the new date for
        the authenticated user.
      parameters:
      - description: Old Visit UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: New Visit Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/visits.CreateVisitRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/visits.VisitResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Reschedule a visit
      tags:
      - visits
  /users/DeleteProfile:
    delete:
      description: Soft deletes the authenticated user's local account by marking
        deleted_at. The Supabase account may still exist, but deleted local users
        cannot log in through this API.
      parameters:
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Account deleted successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid or expired session
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Account deletion failed
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete user account
      tags:
      - Users
  /users/login:
    post:
      consumes:
      - application/json
      description: Authenticates the user and returns a JWT token.
      parameters:
      - description: Credenciales de acceso
        in: body
        name: login
        required: true
        schema:
          $ref: '#/definitions/users.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: Login exitoso
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Email o contraseña requeridos
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Login fallido
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login
      tags:
      - Users
  /users/profile:
    put:
      consumes:
      - application/json
      description: Updates the authenticated user's profile data using the Supabase
        access token to resolve the user identity.
      parameters:
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Profile data to update
        in: body
        name: profile
        required: true
        schema:
          $ref: '#/definitions/users.UpdateUserInput'
      produces:
      - application/json
      responses:
        "200":
          description: Profile updated successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid or expired session
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Profile update failed
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update user profile
      tags:
      - Users
  /users/register:
    post:
      consumes:
      - application/json
      description: Create new User
      parameters:
      - description: Datos del nuevo usuario
        in: body
        name: user
