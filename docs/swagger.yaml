  /api/v1/properties:
    get:
      description: Returns a paginated list of property cards with optional search,
        status, type, modality, and location filters. Deleted properties are always
        excluded. The selected card price prefers sale price unless the property modality
        is rent or no current sale price exists; in that case the best current rent
        price is used following monthly, annual, weekly, then daily priority.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Results per page
        in: query
        name: page_size
        type: integer
      - description: Search term across title, street, neighborhood, city, state,
          and country
        in: query
        name: q
        type: string
      - collectionFormat: csv
        description: Filter by property status. Repeat the parameter to send multiple
          values.
        in: query
        items:
          type: integer
        name: status_id
        type: array
      - description: Filter by property type ID
        in: query
        name: property_type_id
        type: integer
      - description: Filter by modality ID
        in: query
        name: modality_id
        type: integer
      - description: Filter by country ID
        in: query
        name: country_id
        type: integer
      - description: Filter by state ID
        in: query
        name: state_id
        type: integer
      - description: Filter by city ID
        in: query
        name: city_id
        type: integer
      - description: 'Sort field: created_at, title, or price'
        in: query
        name: sort
        type: string
      - description: 'Sort order: asc or desc'
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Paginated property cards
          schema:
            $ref: '#/definitions/properties.ListPropertiesResult'
        "400":
          description: Invalid query params
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List properties
      tags:
      - Properties
    post:
      consumes:
      - application/json
      description: Registers a property and all related records in a single database
        transaction. The backend generates the property UUID and stores subtype, location,
        pricing, services, and clauses atomically.
      parameters:
      - description: Property payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/properties.CreatePropertyInput'
      produces:
