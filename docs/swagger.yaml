        type: string
      - description: Optional alt text
        in: formData
        name: alt_text
        type: string
      - default: 0
        description: Sort order
        in: formData
        name: sort_order
        type: integer
      - default: false
        description: Mark as cover
        in: formData
        name: is_cover
        type: boolean
      produces:
      - application/json
      responses:
        "201":
