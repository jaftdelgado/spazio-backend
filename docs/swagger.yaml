  /api/v1/catalogs/rent-periods:
    get:
      description: Returns rent periods enabled for the provided property type, ordered
        by period_id ascending.
      parameters:
      - description: Property type ID
        in: query
        name: property_type_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of rent periods
          schema:
            $ref: '#/definitions/catalogs.ListRentPeriodsResult'
        "400":
          description: Invalid query params
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List rent periods
      tags:
      - Catalogs
  /api/v1/clauses:
    get:
      description: Returns clauses available for the provided modality. When q is
        present, the endpoint performs a filtered search. Results are paginated.
      parameters:
      - description: Modality ID
        in: query
        name: modality_id
        required: true
        type: integer
      - description: Search term
        in: query
        name: q
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Results per page
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of clauses
          schema:
            $ref: '#/definitions/clauses.ListClausesResult'
        "400":
          description: Invalid query params
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List clauses
      tags:
      - Clauses
  /api/v1/properties:
    post:
      consumes:
      - application/json
      description: Registers a property and all related records in a single database
        transaction. The backend generates the property UUID and stores subtype, location,
        pricing, services, and clauses atomically.
      parameters:
      - description: Property payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/properties.CreatePropertyInput'
      produces:
      - application/json
      responses:
        "201":
          description: Property created
          schema:
            $ref: '#/definitions/properties.CreatePropertyResult'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Register a new property
      tags:
      - Properties
  /api/v1/properties/{id}/availability:
    get:
      consumes:
      - application/json
      description: Get available 1-hour slots for a property on a specific date
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: integer
      - description: Date (YYYY-MM-DD). Defaults to today.
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/visits.TimeSlot'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Get property availability
      tags:
      - visits
  /api/v1/services:
    get:
      description: Returns popular active services when q is empty, or matching active
        services when q is provided. Results include metadata and honor the optional
        limit parameter.
      parameters:
      - description: Search term
        in: query
        name: q
        type: string
      - description: Results limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of services
          schema:
            $ref: '#/definitions/services.ListServicesResult'
        "400":
          description: Invalid query params
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List services
      tags:
      - Services
  /api/v1/uploads/properties/{property_uuid}/photos:
    post:
      consumes:
      - multipart/form-data
      description: Uploads a photo for a property to R2 and registers it
      parameters:
      - description: Property UUID
        in: path
        name: property_uuid
        required: true
        type: string
      - description: The image file
        in: formData
        name: file
        required: true
        type: file
      - description: Label
        in: formData
        name: label
        type: string
      - description: Alt Text
        in: formData
        name: alt_text
        type: string
      - default: 0
        description: Sort Order
        in: formData
        name: sort_order
        type: integer
      - default: false
        description: Is Cover
        in: formData
        name: is_cover
        type: boolean
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/uploads.UploadPhotoResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Upload property photo
      tags:
      - uploads
  /api/v1/visits:
    get:
      consumes:
      - application/json
      description: List visits according to user role (Admin, Agent, Client). Supports
        filtering by status, property and date. Requires X-User-ID header.
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: integer
      - description: Status ID
        in: query
        name: status_id
        type: integer
      - description: Property ID
        in: query
        name: property_id
        type: integer
      - description: Date (YYYY-MM-DD)
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/visits.VisitResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List user visits
      tags:
      - visits
    post:
      consumes:
      - application/json
      description: Create a new visit request in 'Pending' status. Requires X-User-ID
        header.
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: integer
      - description: Visit Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/visits.CreateVisitRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/visits.VisitResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Schedule a visit
      tags:
      - visits
  /api/v1/visits/{uuid}/complete:
    patch:
      consumes:
      - application/json
      description: Mark a confirmed visit as completed. Only for Agents or Admin.
        Requires X-User-ID header.
      parameters:
      - description: Visit UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Complete a visit
      tags:
      - visits
  /api/v1/visits/{uuid}/confirm:
    patch:
      consumes:
      - application/json
      description: Transition a visit status towards 'Confirmed' by Client or Agent.
        Requires X-User-ID header.
      parameters:
      - description: Visit UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Confirm a visit
      tags:
      - visits
  /api/v1/visits/{uuid}/reschedule:
    patch:
      consumes:
      - application/json
      description: Cancels the old visit and creates a new one with the new date.
        Requires X-User-ID header.
      parameters:
      - description: Old Visit UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: integer
      - description: New Visit Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/visits.CreateVisitRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/visits.VisitResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Reschedule a visit
      tags:
      - visits
swagger: "2.0"
