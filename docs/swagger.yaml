            $ref: '#/definitions/properties.UpdatePropertyResult'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Property not found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Update property
      tags:
      - Properties
