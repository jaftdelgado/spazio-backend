basePath: /
definitions:
  catalogs.ListModalitiesResult:
    properties:
      data:
        items:
          $ref: '#/definitions/catalogs.Modality'
        type: array
    type: object
  catalogs.ListPropertyTypesResult:
    properties:
      data:
        items:
          $ref: '#/definitions/catalogs.PropertyType'
        type: array
    type: object
  catalogs.ListRentPeriodsResult:
    properties:
      data:
        items:
          $ref: '#/definitions/catalogs.RentPeriod'
        type: array
    type: object
  catalogs.Modality:
    properties:
      modality_id:
        example: 1
        type: integer
      name:
        example: Rent
        type: string
    type: object
  catalogs.PropertyType:
    properties:
      icon:
        example: /icons/apartment.svg
        type: string
      name:
        example: Apartment
        type: string
      property_type_id:
        example: 1
        type: integer
    type: object
  catalogs.RentPeriod:
    properties:
      name:
        example: Monthly
        type: string
      period_id:
        example: 1
        type: integer
    type: object
  payments.ConfirmPaymentRequest:
    properties:
      mock_token:
        description: e.g., "tok_success", "tok_oxxo_pending"
        type: string
    required:
    - mock_token
    type: object
  payments.PaymentIntentRequest:
    properties:
      amount:
        type: number
      method_id:
        type: integer
      property_id:
        type: integer
    required:
    - amount
    - method_id
    - property_id
    type: object
  payments.PaymentMethodResponse:
    properties:
      method_id:
        type: integer
      name:
        type: string
    type: object
  payments.PaymentResponse:
    properties:
      amount:
        type: number
      created_at:
        type: string
      instructions:
        type: string
      method:
        type: string
      payment_date:
        type: string
      payment_uuid:
        type: string
      property_id:
        type: integer
      property_title:
        type: string
      redirect_url:
        type: string
      status:
        type: string
    type: object
  shared.ErrorResponse:
    properties:
      code:
        example: 404
        type: integer
      message:
        example: Resource not found
        type: string
    type: object
  uploads.UploadPhotoResult:
    properties:
      photo_id:
        type: integer
      storage_key:
        type: string
      url:
        type: string
    type: object
  visits.CreateVisitRequest:
    properties:
      property_id:
        type: integer
      visit_date:
        type: string
    required:
    - property_id
    - visit_date
    type: object
  visits.TimeSlot:
    properties:
      available:
        type: boolean
      end_time:
        type: string
      start_time:
        type: string
    type: object
  visits.VisitResponse:
    properties:
      address:
        type: string
      agent_id:
        type: integer
      agent_name:
        type: string
      agent_phone:
        type: string
      city_name:
        type: string
      client_name:
        type: string
      client_phone:
        type: string
      created_at:
        type: string
      property_id:
        type: integer
      property_title:
        type: string
      status:
        type: string
      visit_date:
        type: string
      visit_uuid:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API de Spazio Backend
  title: Spazio API
  version: "1.0"
paths:
  /catalogs/modalities:
    get:
      description: Returns all modalities ordered by modality_id ascending.
      produces:
      - application/json
      responses:
        "200":
          description: List of modalities
          schema:
            $ref: '#/definitions/catalogs.ListModalitiesResult'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List modalities
      tags:
      - Catalogs
  /catalogs/property-types:
    get:
      description: Returns all non-deprecated property types ordered by property_type_id
        ascending.
      produces:
      - application/json
      responses:
        "200":
          description: List of property types
          schema:
            $ref: '#/definitions/catalogs.ListPropertyTypesResult'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List property types
      tags:
      - Catalogs
  /catalogs/rent-periods:
    get:
      description: Returns all rent periods ordered by period_id ascending.
      produces:
      - application/json
      responses:
        "200":
          description: List of rent periods
          schema:
            $ref: '#/definitions/catalogs.ListRentPeriodsResult'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List rent periods
      tags:
      - Catalogs
  /payment-methods:
    get:
      description: List supported payment methods (Card, PayPal, OXXO, etc.)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/payments.PaymentMethodResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Get available payment methods
      tags:
      - payments
  /payments:
    get:
      description: History of payments for the authenticated user. Requires X-User-ID
        header.
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/payments.PaymentResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List user payments
      tags:
      - payments
  /payments/{uuid}/confirm:
    post:
      consumes:
      - application/json
      description: Simulate the confirmation of a payment from a gateway. Requires
        X-User-ID header.
      parameters:
      - description: Payment UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: integer
      - description: Mock Token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/payments.ConfirmPaymentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/payments.PaymentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Confirm a payment (Mock)
      tags:
      - payments
  /payments/intent:
    post:
      consumes:
      - application/json
      description: Start a payment process for a property reservation (Apartado).
        Requires X-User-ID header.
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: integer
      - description: Payment Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/payments.PaymentIntentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/payments.PaymentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Create a payment intent
      tags:
      - payments
  /properties/{id}/availability:
    get:
      consumes:
      - application/json
      description: Get available 1-hour slots for a property on a specific date
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: integer
      - description: Date (YYYY-MM-DD). Defaults to today.
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/visits.TimeSlot'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Get property availability
      tags:
      - visits
  /uploads/properties/{property_uuid}/photos:
    post:
      consumes:
      - multipart/form-data
      description: Uploads a photo for a property to R2 and registers it
      parameters:
      - description: Property UUID
        in: path
        name: property_uuid
        required: true
        type: string
      - description: The image file
        in: formData
        name: file
        required: true
        type: file
      - description: Label
        in: formData
        name: label
        type: string
      - description: Alt Text
        in: formData
        name: alt_text
        type: string
      - default: 0
        description: Sort Order
        in: formData
        name: sort_order
        type: integer
      - default: false
        description: Is Cover
        in: formData
        name: is_cover
        type: boolean
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/uploads.UploadPhotoResult'
      summary: Upload property photo
      tags:
      - uploads
  /visits:
    get:
      consumes:
      - application/json
      description: List visits according to user role (Admin, Agent, Client). Supports
        filtering by status, property and date. Requires X-User-ID header.
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: integer
      - description: Status ID
        in: query
        name: status_id
        type: integer
      - description: Property ID
        in: query
        name: property_id
        type: integer
      - description: Date (YYYY-MM-DD)
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/visits.VisitResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: List user visits
      tags:
      - visits
    post:
      consumes:
      - application/json
      description: Create a new visit request in 'Pending' status. Requires X-User-ID
        header.
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: integer
      - description: Visit Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/visits.CreateVisitRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/visits.VisitResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Schedule a visit
      tags:
      - visits
  /visits/{uuid}/complete:
    patch:
      consumes:
      - application/json
      description: Mark a confirmed visit as completed. Only for Agents or Admin.
        Requires X-User-ID header.
      parameters:
      - description: Visit UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Complete a visit
      tags:
      - visits
  /visits/{uuid}/confirm:
    patch:
      consumes:
      - application/json
      description: Transition a visit status towards 'Confirmed' by Client or Agent.
        Requires X-User-ID header.
      parameters:
      - description: Visit UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Confirm a visit
      tags:
      - visits
  /visits/{uuid}/reschedule:
    patch:
      consumes:
      - application/json
      description: Cancels the old visit and creates a new one with the new date.
        Requires X-User-ID header.
      parameters:
      - description: Old Visit UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: integer
      - description: New Visit Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/visits.CreateVisitRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/visits.VisitResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Reschedule a visit
      tags:
      - visits
swagger: "2.0"
